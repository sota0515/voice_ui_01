<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Dify Voice App</title>
  <style>
    /* 画面の高さに100dvh（スマホのバーを除いた高さ）を使用 */
    body { 
      margin: 0; 
      padding: 0; 
      font-family: sans-serif; 
      background-color: #e0f2f7; 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      height: 100dvh; 
      overflow: hidden;
    }

    #chat-container { 
      flex: 1; 
      overflow-y: auto; 
      padding: 15px; 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      -webkit-overflow-scrolling: touch; /* iOSのスクロールを滑らかに */
    }

    .message { 
      max-width: 85%; 
      padding: 10px 15px; 
      border-radius: 18px; 
      font-size: 15px; 
      box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
      word-wrap: break-word;
    }

    .user-msg { align-self: flex-end; background-color: #007bff; color: white; border-bottom-right-radius: 2px; }
    .ai-msg { align-self: flex-start; background-color: white; border: 1px solid #b3e5fc; border-bottom-left-radius: 2px; }

    #input-area { 
      background-color: white; 
      padding: 10px 10px env(safe-area-inset-bottom); /* iPhoneの下部バー対策 */
      border-top: 1px solid #b3e5fc; 
      display: flex; 
      gap: 8px; 
      align-items: center;
    }

    textarea { 
      flex: 1; 
      padding: 10px; 
      border: 1px solid #b3e5fc; 
      border-radius: 20px; 
      font-size: 16px; 
      outline: none; 
      resize: none; 
      max-height: 100px;
      line-height: 1.4;
    }

    button { 
      padding: 0 12px; 
      background-color: #007bff; 
      color: white; 
      border: none; 
      border-radius: 20px; 
      height: 40px; 
      font-weight: bold; 
      cursor: pointer;
      flex-shrink: 0;
    }

    button:disabled { background-color: #ccc; }

    /* 各種アイコンボタンのスタイル */
    .icon-btn { 
      background-color: #f0f0f0; 
      color: #333; 
      font-size: 18px; 
      width: 44px; 
      height: 44px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      border-radius: 50%;
    }

    #mic-btn.recording { background-color: #ff4d4d; color: white; animation: pulse 1.5s infinite; }
    #speaker-btn.off { color: #aaa; background-color: #eee; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="chat-container"></div>
  <div id="input-area">
    <button id="speaker-btn" class="icon-btn" title="読み上げON/OFF">🔊</button>
    <button id="mic-btn" class="icon-btn">🎤</button>
    <textarea id="user-input" placeholder="入力..." rows="1"></textarea>
    <button id="send-btn" onclick="send()">送信</button>
  </div>

  <script>
    const input = document.getElementById('user-input');
    const micBtn = document.getElementById('mic-btn');
    const sendBtn = document.getElementById('send-btn');
    const speakerBtn = document.getElementById('speaker-btn');
    const chatContainer = document.getElementById('chat-container');
    
    const gasUrl = "https://script.google.com/macros/s/AKfycbwMJuS4FYgiGMbMdyZxSfkQraavxvBjrRHoES_7PWqHl0L8AsjtmIYJE6iO1BXsMGvw/exec"; 

    let isSpeakingEnabled = true; // 読み上げフラグ
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    // 読み上げボタンの切り替え
    speakerBtn.addEventListener('click', () => {
      isSpeakingEnabled = !isSpeakingEnabled;
      speakerBtn.innerText = isSpeakingEnabled ? "🔊" : "🔇";
      speakerBtn.classList.toggle('off', !isSpeakingEnabled);
      if (!isSpeakingEnabled) window.speechSynthesis.cancel(); // 停止
    });

    // 音声認識
    micBtn.addEventListener('click', () => {
      if (!SpeechRecognition) return alert("未対応ブラウザです");
      if (recognition) { recognition.stop(); return; }
      
      recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.onstart = () => micBtn.classList.add('recording');
      recognition.onend = () => { micBtn.classList.remove('recording'); recognition = null; };
      recognition.onresult = (e) => { 
        input.value = e.results[0][0].transcript;
        input.style.height = 'auto'; // 高さリセット
        send(); 
      };
      recognition.start();
    });

    function speak(text) {
      if (!isSpeakingEnabled) return;
      window.speechSynthesis.cancel();
      const uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = 'ja-JP';
      window.speechSynthesis.speak(uttr);
    }

    async function send() {
      const msg = input.value.trim();
      if (!msg || sendBtn.disabled) return;
      
      sendBtn.disabled = true;
      appendMessage('user-msg', msg);
      input.value = '';
      input.style.height = 'auto';

      try {
        const response = await fetch(gasUrl, {
          method: "POST",
          body: JSON.stringify({ message: msg })
        });
        const data = await response.json();
        appendMessage('ai-msg', data.reply);
        speak(data.reply);
      } catch (e) {
        appendMessage('ai-msg', "通信エラーが発生しました");
      } finally {
        sendBtn.disabled = false;
      }
    }

    function appendMessage(className, text) {
      const div = document.createElement('div');
      div.className = 'message ' + className;
      div.innerText = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 入力欄の自動改行対応
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    });
  </script>
</body>
</html>
